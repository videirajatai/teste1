<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel do Líder - Videira Jataí</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
      /* --- ESTILOS ESPECÍFICOS DO PAINEL DO LÍDER --- */
      .container { max-width: 800px; margin: 0 auto; padding: 15px; }

      /* HEADER */
      .header { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 15px 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; border-left: 5px solid var(--primary); }
      .header h3 { margin: 0; color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 1.1rem; }
      .btn-refresh { background: none; border: none; font-size: 1.2rem; color: var(--text-light); cursor: pointer; transition: 0.3s; }
      .btn-refresh:hover { color: var(--primary); transform: rotate(90deg); }

      /* DASHBOARD */
      .stat-card { background: linear-gradient(135deg, var(--primary), #5c0016); color: white; padding: 20px; border-radius: var(--radius); text-align: center; box-shadow: 0 4px 15px rgba(128, 0, 32, 0.2); margin-bottom: 20px; }
      .stat-card h1 { margin: 0; font-size: 2.5rem; font-weight: 700; }
      .stat-card small { text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; font-size: 0.75rem; }

      /* MENU NAVEGAÇÃO */
      .nav-menu { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
      .nav-btn { flex: 1 1 30%; min-width: 100px; padding: 12px; border: none; border-radius: 10px; background: white; color: var(--text-light); font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.03); font-size: 0.8rem; }
      .nav-btn i { font-size: 1.2rem; }
      .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(128, 0, 32, 0.3); }

      /* CARDS MEMBROS */
      .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; }
      @media (min-width: 600px) { .member-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); } }
      .member-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); border: 1px solid white; display: flex; flex-direction: column; gap: 10px; }
      .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
      .card-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin: 0; }
      .cat-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; background: #eee; color: #555; font-weight: bold; }
      .card-info { font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
      .status-row { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
      .status-pill { flex: 1 1 auto; text-align: center; font-size: 0.7rem; padding: 5px 8px; border-radius: 6px; background: #f0f0f0; color: #999; font-weight: 600; white-space: nowrap; }
      .status-pill.active { background: var(--success-bg); color: var(--success-text); border: 1px solid #c3e6cb; }
      .btn-zap { display: block; width: 100%; text-align: center; padding: 10px; margin-top: 5px; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.2s; box-sizing: border-box; }

      /* TABELA CELULAS */
      .table-clean { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid #ddd; }
      .table-clean th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
      .table-clean td { padding: 12px; border-bottom: 1px solid #eee; color: #333; font-size: 0.9rem; font-weight: 500; }
      .table-clean tr:nth-child(even) { background-color: #fcfcfc; }

      /* LISTA DE PALAVRAS & MODAL */
      .word-list-item { background: white; border-radius: var(--radius); padding: 15px; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-left: 4px solid var(--accent); transition: 0.2s; }
      .word-list-item:active { transform: scale(0.98); }
      .word-date { font-weight: 800; color: var(--text-main); font-size: 1rem; }
      .word-theme { font-size: 0.85rem; color: var(--text-light); margin-top: 2px; }

      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; backdrop-filter: blur(2px); }
      .modal-content { background: white; width: 100%; max-width: 800px; height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .word-text { line-height: 1.6; color: #444; font-size: 0.95rem; white-space: pre-wrap; margin-top: 15px; }
      .btn-close-modal { position: absolute; top: 15px; right: 15px; background: #eee; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: #555; z-index: 10; display: flex; align-items: center; justify-content: center;}

      .btn-youtube { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background-color: #FF0000; color: white; font-weight: bold; text-decoration: none; border-radius: 8px; margin-bottom: 15px; transition: background 0.2s; box-sizing: border-box; }
      .btn-youtube:hover { background-color: #cc0000; }

      /* FORMS */
      .form-box { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
      label { display: block; margin-bottom: 5px; color: var(--text-light); font-weight: 600; font-size: 0.85rem; }
      input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; box-sizing: border-box; }
      input:focus, textarea:focus { border-color: var(--primary); background: #fff; }
      .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;}
      .btn-save:disabled { opacity: 0.7; cursor: not-allowed; }
      .btn-add-member { background: var(--success-text); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
      
      .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
      .check-option { display: block; position: relative; cursor: pointer; }
      .check-option input { position: absolute; opacity: 0; }
      .checkmark { display: block; padding: 10px; text-align: center; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; color: #777; font-weight: 600; }
      .check-option input:checked ~ .checkmark { background: var(--success-bg); color: var(--success-text); border-color: #badbcc; }
    </style>
  </head>
  <body>
<script>
      const paginasPermitidas = JSON.parse(sessionStorage.getItem('paginasPermitidas') || "[]");
      if(!sessionStorage.getItem('usuarioLogado') || !paginasPermitidas.includes("lider")) {
          window.location.href = "index.html";
      }
  </script>

    <div class="container">
      
      <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
          <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" style="width: 110px;">
          <h3>Painel do Líder</h3>
        </div>
        <button onclick="carregarTudo()" class="btn-refresh"><i id="iconRefresh" class="fas fa-sync-alt"></i></button>
      </div>

      <div class="stat-card">
        <small>Membros Ativos</small>
        <h1 id="totalMembros">0</h1>
      </div>

      <div class="nav-menu">
        <button onclick="mudarSecao('lista')" class="nav-btn active" id="btn-lista"><i class="fas fa-users"></i> Membros</button>
        <button onclick="mudarSecao('celulas')" class="nav-btn" id="btn-celulas"><i class="fas fa-network-wired"></i> Células</button>
        <button onclick="mudarSecao('relatorio')" class="nav-btn" id="btn-relatorio"><i class="fas fa-clipboard-list"></i> Relatório</button>
        <button onclick="mudarSecao('palavras')" class="nav-btn" id="btn-palavras"><i class="fas fa-book-open"></i> Palavras</button>
        <button onclick="mudarSecao('sugestao')" class="nav-btn" id="btn-sugestao"><i class="fas fa-lightbulb"></i> Sugestão</button>
      </div>

      <div id="secao-lista">
        <div style="background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow);">
          <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
              <h4 style="margin:0; color: var(--text-light);">Gerenciar Membros</h4>
              <button onclick="mudarSecao('cadastro')" class="btn-add-member"><i class="fas fa-plus"></i> Novo Membro</button>
          </div>
          <div style="display:flex; gap:10px;">
            <input type="text" id="inputBusca" placeholder="🔍 Buscar nome..." onkeyup="filtrarMembros()" style="margin:0; flex:2;">
            <select id="filtroCelula" onchange="filtrarMembros()" style="margin:0; flex:1;"><option value="">Todas</option></select>
          </div>
        </div>
        <div id="gridMembros" class="member-grid"></div>
      </div>

      <div id="secao-celulas" class="hidden">
        <h4 style="color: var(--primary); margin-top:0; margin-bottom: 15px;">Quadro de Células</h4>
        <div style="overflow-x:auto;">
          <table class="table-clean" id="tabelaCelulas">
            <thead><tr><th>Célula</th><th>Líder</th><th>Dia/Horário</th></tr></thead>
            <tbody id="corpoCelulas"></tbody>
          </table>
        </div>
      </div>

      <div id="secao-palavras" class="hidden">
         <h4 style="color: var(--accent); margin-top:0; margin-bottom: 15px;">Palavras & Estudos</h4>
         <div id="listaPalavras">
           <p style="text-align:center; color:#999;">Carregando...</p>
         </div>
      </div>

      <div id="modalPalavra" class="modal-overlay hidden" onclick="fecharModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="btn-close-modal" onclick="fecharModal(null)">&times;</button>
            <h3 id="modalTitulo" style="color:var(--primary); margin-top:10px;"></h3>
            <small id="modalData" style="color:#777; display:block; margin-bottom:15px;"></small>
            <a id="btnLinkYoutube" href="#" target="_blank" class="btn-youtube hidden"><i class="fab fa-youtube"></i> Assistir no YouTube</a>
            <div id="modalTexto" class="word-text"></div>
        </div>
      </div>

      <div id="secao-cadastro" class="hidden form-box">
        <h3 style="color:var(--primary); margin-top:0;">Cadastrar Novo</h3>
        <form id="formMembro">
          <label>Nome Completo</label><input type="text" name="nome" required>
          <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>Nascimento</label><input type="date" name="nascimento"></div>
            <div style="flex:1;"><label>WhatsApp</label><input type="tel" name="telefone" placeholder="(00) 00000-0000"></div>
          </div>
          <label>Célula</label><select name="celula" id="selectCelulas" required></select>
          <label>Categoria</label><select name="categoria"><option>Membro</option><option selected>Frequentador</option><option>Líder</option></select>
          <label style="margin-top:15px;">Passos de Fé</label>
          <div class="check-grid">
             <label class="check-option"><input type="checkbox" name="batizado"><span class="checkmark">Batismo</span></label>
             <label class="check-option"><input type="checkbox" name="cursao"><span class="checkmark">Cursão</span></label>
             <label class="check-option"><input type="checkbox" name="ctl"><span class="checkmark">CTL</span></label>
             <label class="check-option"><input type="checkbox" name="encontro"><span class="checkmark">Encontro</span></label>
          </div>
          <div style="display:flex; gap:10px;">
             <button type="button" onclick="mudarSecao('lista')" style="flex:1; background:#eee; color:#555; border:none; border-radius:8px; cursor:pointer;">Cancelar</button>
             <button type="submit" id="btnSalvar" class="btn-save" style="flex:2;">Salvar</button>
          </div>
        </form>
      </div>

      <div id="secao-relatorio" class="hidden form-box">
        <h3 style="color:#0056b3; margin-top:0;">Relatório Semanal</h3>
        <form id="formRelatorio">
           <div style="display:flex; gap:10px;">
             <div style="flex:1;"><label>Data</label><input type="date" name="data" id="relData" required></div>
             <div style="flex:1;"><label>Célula</label><select name="celula" id="selectCelulasRel" required></select></div>
           </div>
           <label>Frequência (Nomes)</label><textarea name="presentes" rows="3" required placeholder="Lista de presença... Separe por vírgula"></textarea>
           <label>Quem Ministrou Quebra-Gelo ?</label><input type="text" name="quebraGelo">
           <label>Quem Ministrou Palavra ?</label><input type="text" name="palavra">
           <label>Quem Ministrou Louvor ?</label><input type="text" name="louvor">
           <label>Quem Levou o Lanche ?</label><input type="text" name="lanche">
           <label style="color:var(--primary);">Observações / Ocorrências</label>
           <textarea name="observacoes" rows="2" placeholder="Algo importante a relatar ao pastor?"></textarea>
           <button type="submit" id="btnRelatorio" class="btn-save" style="background:#0056b3;">Enviar Relatório</button>
        </form>
      </div>

      <div id="secao-sugestao" class="hidden form-box">
        <h3 style="color:#b58900; margin-top:0;">Caixa de Sugestões</h3>
        <p style="color:#666; font-size:0.9rem;">Deixe sua ideia, crítica ou sugestão para a liderança.</p>
        <form id="formSugestao">
           <textarea name="mensagem" rows="6" required placeholder="Escreva aqui..." style="resize: vertical;"></textarea>
           <button type="submit" id="btnSugestao" class="btn-save" style="background:var(--accent); color:#333;">Enviar</button>
        </form>
      </div>

    </div>

    <script>
      const API_URL = sessionStorage.getItem('urlApi');
      let dadosMembros = [], dadosCelulas = [], listaPalavras = [];
      
      window.onload = carregarTudo;

      // --- O NOVO MOTOR DE COMUNICAÇÃO (Substitui o google.script.run) ---
      async function fetchGoogle(action, payload = {}) {
        payload.usuarioAtivo = sessionStorage.getItem('usuarioLogado');
          try {
              let res = await fetch(API_URL, {
                  method: 'POST',
                  body: JSON.stringify({ action: action, payload: payload })
              });
              let json = await res.json();
              if (json.status === "sucesso") return json.dados || json.mensagem;
              else throw new Error(json.mensagem);
          } catch(e) {
              console.error("Erro na API:", e);
              alert("Ocorreu um erro ao comunicar com o servidor: " + e.message);
              throw e;
          }
      }

      async function carregarTudo() {
        const icon = document.getElementById('iconRefresh'); if(icon) icon.classList.add('fa-spin');
        document.getElementById('relData').valueAsDate = new Date();
        
        try {
            // Busca dados iniciais
            const res = await fetchGoogle('buscarDadosIniciais');
            dadosMembros = res.membros; 
            dadosCelulas = res.celulas;
            document.getElementById('totalMembros').innerText = res.total;
            renderizarMembros(res.membros);
            renderizarCelulas(res.celulas);
            preencherSelects(res.celulas);
            
            // Busca palavras
            const palavras = await fetchGoogle('buscarPalavras');
            listaPalavras = palavras.reverse(); 
            renderizarPalavras(listaPalavras);
            
        } catch(e) {
            console.log("Erro ao carregar dados.");
        } finally {
            if(icon) icon.classList.remove('fa-spin');
        }
      }

      function mudarSecao(s) {
         ['lista','celulas','cadastro','relatorio','sugestao','palavras'].forEach(id => document.getElementById('secao-'+id).classList.add('hidden'));
         document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
         document.getElementById('secao-'+s).classList.remove('hidden');
         if(document.getElementById('btn-'+s)) document.getElementById('btn-'+s).classList.add('active');
      }

      function renderizarMembros(lista) {
         const grid = document.getElementById('gridMembros'); grid.innerHTML = '';
         const check = (val) => (String(val).toLowerCase()==='sim' || val===true) ? 'active' : '';
         const formatData = (d) => { if(!d)return''; if(d.includes('/')) return d; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}`:d; };

         lista.forEach(m => {
            let nome=m[1], celula=m[3]||'-', tel=String(m[4]||'');
            let telClean = tel.replace(/\D/g, '');
            let btnZap = (telClean.length > 8) ? `<a href="https://wa.me/55${telClean}" target="_blank" class="btn-zap"><i class="fab fa-whatsapp"></i> Conversar</a>` : '';
            let nasc = m[10] ? `<span style="font-size:0.8rem; margin-left:auto; color:#999;"><i class="fas fa-birthday-cake"></i> ${formatData(m[10])}</span>` : '';

            grid.innerHTML += `
              <div class="member-card" data-nome="${nome.toLowerCase()}" data-celula="${celula.toLowerCase()}">
                 <div class="card-header"><h4 class="card-name">${nome}</h4><span class="cat-badge cat-${m[2]}">${m[2]}</span></div>
                 <div class="card-info"><i class="fas fa-users" style="color:#bbb;"></i> ${celula} ${nasc}</div>
                 <div class="status-row">
                    <div class="status-pill ${check(m[6])}">Batismo</div>
                    <div class="status-pill ${check(m[7])}">Cursão</div>
                    <div class="status-pill ${check(m[8])}">CTL</div>
                    <div class="status-pill ${check(m[9])}">Encontro</div>
                 </div>
                 ${btnZap}
              </div>`;
         });
      }

      function renderizarPalavras(lista) {
          const div = document.getElementById('listaPalavras');
          div.innerHTML = '';
          if(!lista || lista.length === 0) {
              div.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">Nenhuma palavra cadastrada.</p>';
              return;
          }

          lista.forEach((p, index) => {
              let dataF = p[0];
              try { if(p[0].includes('-')) { const dp=p[0].split('-'); dataF=`${dp[2]}/${dp[1]}/${dp[0]}`; } } catch(e){}

              div.innerHTML += `
              <div class="word-list-item" onclick="abrirPalavra(${index})">
                  <div>
                      <div class="word-date"><i class="far fa-calendar-alt"></i> ${dataF}</div>
                      <div class="word-theme">${p[1]}</div>
                  </div>
                  <i class="fas fa-chevron-right" style="color:var(--text-light);"></i>
              </div>`;
          });
      }

      function abrirPalavra(index) {
          const p = listaPalavras[index]; 
          document.getElementById('modalTitulo').innerText = p[1];
          let dataF = p[0];
          try { if(p[0].includes('-')) { const dp=p[0].split('-'); dataF=`${dp[2]}/${dp[1]}/${dp[0]}`; } } catch(e){}
          document.getElementById('modalData').innerText = dataF;
          document.getElementById('modalTexto').innerText = p[2];

          const btn = document.getElementById('btnLinkYoutube');
          const link = p[3]; 

          if (link && link.trim() !== "") {
              btn.href = link;
              btn.classList.remove('hidden');
          } else {
              btn.classList.add('hidden');
              btn.href = "#";
          }
          document.getElementById('modalPalavra').classList.remove('hidden');
      }

      function fecharModal(e) {
          if(e === null || e.target.id === 'modalPalavra') {
              document.getElementById('modalPalavra').classList.add('hidden');
          }
      }

      function renderizarCelulas(lista) {
         const tb = document.getElementById('corpoCelulas'); tb.innerHTML = '';
         if(!lista.length) { tb.innerHTML='<tr><td colspan="3" style="text-align:center;">Nenhuma célula encontrada.</td></tr>'; return; }
         lista.forEach(c => {
            tb.innerHTML += `<tr><td><strong>${c[0]}</strong><br><small style="color:#666;">${c[3]||''}</small></td><td>${c[1]}</td><td>${c[2]}</td></tr>`;
         });
      }

      function filtrarMembros() {
         const b = document.getElementById('inputBusca').value.toLowerCase();
         const c = document.getElementById('filtroCelula').value.toLowerCase();
         document.querySelectorAll('.member-card').forEach(card => {
            const match = card.getAttribute('data-nome').includes(b) && (c==="" || card.getAttribute('data-celula').includes(c));
            card.style.display = match ? 'flex' : 'none';
         });
      }

      function preencherSelects(celulas) {
         const s1=document.getElementById('selectCelulas'), s2=document.getElementById('filtroCelula'), s3=document.getElementById('selectCelulasRel');
         s1.innerHTML='<option value="">Selecione...</option>'; s2.innerHTML='<option value="">Todas</option>'; s3.innerHTML='<option value="">Selecione...</option>';
         celulas.forEach(c => {
            s1.innerHTML += `<option value="${c[0]}">${c[0]}</option>`;
            s2.innerHTML += `<option value="${c[0]}">${c[0]}</option>`;
            s3.innerHTML += `<option value="${c[0]}">${c[0]}</option>`;
         });
      }

      // --- ENVIOS DOS FORMULÁRIOS (Assíncronos) ---
      document.getElementById('formMembro').onsubmit = async function(e) {
         e.preventDefault(); 
         const btn = document.getElementById('btnSalvar'); btn.disabled = true; btn.innerText="Salvando...";
         
         const d = { 
            nome: this.nome.value, nascimento: this.nascimento.value, categoria: this.categoria.value, 
            celula: this.celula.value, telefone: this.telefone.value, 
            batizado: this.batizado.checked?"Sim":"Não", cursao: this.cursao.checked?"Sim":"Não", 
            ctl: this.ctl.checked?"Sim":"Não", encontro: this.encontro.checked?"Sim":"Não" 
         };
         
         try {
            const resposta = await fetchGoogle('salvarMembro', d);
            alert(resposta);
            this.reset();
            mudarSecao('lista');
            carregarTudo();
         } finally {
            btn.disabled = false; btn.innerText="Salvar";
         }
      };

      document.getElementById('formRelatorio').onsubmit = async function(e) {
         e.preventDefault(); 
         const btn = document.getElementById('btnRelatorio'); btn.disabled = true; btn.innerText="Enviando...";
         
         const d = { 
            data: this.data.value, celula: this.celula.value, presentes: this.presentes.value, 
            quebraGelo: this.quebraGelo.value, palavra: this.palavra.value, louvor: this.louvor.value, 
            lanche: this.lanche.value, observacoes: this.observacoes.value 
         };
         
         try {
             const resposta = await fetchGoogle('salvarRelatorio', d);
             alert(resposta);
             this.reset();
             document.getElementById('relData').valueAsDate = new Date();
             mudarSecao('lista');
         } finally {
             btn.disabled = false; btn.innerText="Enviar Relatório";
         }
      };

      document.getElementById('formSugestao').onsubmit = async function(e) {
         e.preventDefault(); 
         const btn = document.getElementById('btnSugestao'); btn.disabled = true; btn.innerText="Enviando...";
         
         const sugestao = this.mensagem.value;
         try {
             const resposta = await fetchGoogle('salvarSugestao', { mensagem: sugestao });
             alert(resposta);
             this.reset();
             mudarSecao('lista');
         } finally {
             btn.disabled = false; btn.innerText="Enviar";
         }
      };
    </script>
  </body>
</html>
